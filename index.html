<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SP2E Converter</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">

        <h1>🎓 SP2E Converter</h1>

        <p class="subtitle">
            Quy đổi điểm SP2E sang điểm THPT theo quy định của HPU2
        </p>

        <label for="score">
            Điểm SP2E
        </label>

        <input
            id="score"
            type="number"
            step="0.01"
            placeholder="Ví dụ: 24.55">

        <label for="major">
            Tổ hợp xét tuyển
        </label>

        <select id="major">

            <option value="A00">A00</option>

            <option value="A01">A01</option>

            <option value="B00">B00</option>

            <option value="D01">D01</option>

        </select>

        <button onclick="convert()">

            Quy đổi

        </button>

        <div class="result">

            <h2>Kết quả</h2>

            <div id="result">

                --

            </div>

        </div>

        <div class="detail">

            <h3>Chi tiết phép tính</h3>

            <p id="formula">

                Chưa có dữ liệu.

            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
