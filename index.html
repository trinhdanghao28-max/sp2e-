<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SP2E Converter</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">

        <h1>SP2E Converter</h1>

        <p class="subtitle">
            Quy đổi điểm SP2E sang điểm THPT
        </p>

        <input
            id="score"
            type="number"
            step="0.01"
            placeholder="Nhập điểm SP2E">

        <button onclick="convert()">
            Quy đổi
        </button>

        <div class="result">

            <h2>Kết quả</h2>

            <div id="result">
                --
            </div>

        </div>

        <div class="detail">

            <h3>Chi tiết phép tính</h3>

            <p id="formula">
                Chưa có dữ liệu.
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
